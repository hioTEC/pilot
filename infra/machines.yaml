version: "1.0"

# SSH naming convention (generated by bin/ssh-gen-config):
#   ssh <host>      — direct (public IP, default port)
#   ssh <host>-jp   — via jump proxy (not generated for jump host itself)
#   ssh <host>-ts   — via Tailscale mesh (always port 22, no jump)
# Aliases get direct entries only.

dev_machines:
  - name: my-laptop
    os: macos
    role: portable-dev

  - name: my-desktop
    os: linux
    role: dev-hub
    always_on: true

